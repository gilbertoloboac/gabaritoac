        <div class="flex-1 flex justify-center">

                <a href="/noticias/?categoria=cursos" class="relative px-3 py-2 group">
                    <span class="hover:text-[#2997FF] transition-colors duration-200">Cursos</span>
                    <span class="absolute bottom-0 left-3 right-3 h-0.5 bg-[#2997FF] scale-x-0 group-hover:scale-x-100 transition-transform duration-200 origin-left"></span>
                </a>
                <a href="/noticias/" class="relative px-3 py-2 group">
                    <span class="hover:text-[#2997FF] transition-colors duration-200">Notícias</span>

                <a href="/sobre/" class="relative px-3 py-2 group">
                    <span class="hover:text-[#2997FF] transition-colors duration-200">Sobre</span>

                </a>
            </nav>
        </div>

        <div class="flex-1 flex items-center justify-end gap-2">
            <button type="button" id="darkmode-toggle" onclick="toggleDarkMode()" aria-label="Alternar modo claro/escuro"
                class="relative w-9 h-9 rounded-xl flex items-center justify-center cursor-pointer
                       bg-white/10 hover:bg-white/20 dark:bg-white/10 dark:hover:bg-white/20
                       transition-all duration-300 hover:scale-105 active:scale-95">
                <i id="darkmode-icon" class="fa-solid fa-lightbulb text-base transition-all duration-300
                    text-amber-400 dark:text-amber-300"></i>
            </button>
            <a href="https://whatsapp.com/channel/0029VbDJLSR3bbV8Vzsnka3v" target="_blank" rel="noopener noreferrer"
                class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold text-xs px-5 py-2.5 rounded-xl transition-all duration-200 shadow-sm whitespace-nowrap hover:shadow-md hover:-translate-y-0.5 active:translate-y-0">
                <i class="fab fa-whatsapp text-xs"></i> Receba no Zap
            </a>

            <button type="button" id="mobile-menu-button"
                class="lg:hidden text-white hover:text-[#2997FF] p-2 focus:outline-none transition-colors duration-200" aria-label="Abrir menu">
                <i id="menu-icon" class="fas fa-bars text-xl"></i>
            </button>
        </div>
    </div>

    <div id="mobile-menu"
        class="lg:hidden bg-[#293962] dark:bg-slate-950 border-t border-white/10 dark:border-slate-800 overflow-hidden transition-all duration-300 ease-in-out max-h-0 opacity-0">

        <div class="px-4 py-4 flex flex-col gap-3">
            <nav class="flex flex-col gap-3 font-semibold text-white text-sm">
                <a href="/noticias/?categoria=concursos"
                    class="hover:text-[#2997FF] py-2 border-b border-white/10 transition-colors duration-200">Concursos</a>
                <a href="/vestibular-ufac/"
                    class="hover:text-[#2997FF] py-2 border-b border-white/10 transition-colors duration-200">Instituições</a>
                <a href="/noticias/?categoria=cursos" class="hover:text-[#2997FF] py-2 border-b border-white/10 transition-colors duration-200">Cursos</a>
                <a href="/noticias/" class="hover:text-[#2997FF] py-2 border-b border-white/10 transition-colors duration-200">Notícias</a>
                <a href="/sobre/" class="hover:text-[#2997FF] py-2 transition-colors duration-200">Sobre</a>
                <button type="button" onclick="toggleDarkMode()" class="py-2 flex items-center gap-3"
                    aria-label="Alternar modo claro/escuro">
                    <i id="darkmode-icon-mobile" class="fa-solid fa-lightbulb text-sm transition-all duration-300
                        text-amber-400 dark:text-amber-300"></i>
                    <span class="text-xs font-semibold text-white">Modo escuro</span>
                </button>
            </nav>
        </div>
    </div>
</nav>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (document.documentElement.classList.contains('dark')) {
            var icon = document.getElementById('darkmode-icon');
            var iconMobile = document.getElementById('darkmode-icon-mobile');
            if (icon) { icon.classList.remove('text-amber-400'); icon.classList.add('text-amber-300', 'drop-shadow-[0_0_6px_rgba(251,191,36,0.5)]'); }
            if (iconMobile) { iconMobile.classList.remove('text-amber-400'); iconMobile.classList.add('text-amber-300', 'drop-shadow-[0_0_6px_rgba(251,191,36,0.5)]'); }
        }
        const menuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        function openMenu() {
            mobileMenu.classList.remove('max-h-0', 'opacity-0');
            mobileMenu.classList.add('max-h-96', 'opacity-100');
            menuIcon.classList.remove('fa-bars');
            menuIcon.classList.add('fa-times');
        }

        function closeMenu() {
            mobileMenu.classList.remove('max-h-96', 'opacity-100');
            mobileMenu.classList.add('max-h-0', 'opacity-0');
            menuIcon.classList.remove('fa-times');
            menuIcon.classList.add('fa-bars');
        }

        function toggleMenu() {
            if (mobileMenu.classList.contains('max-h-0')) {
                openMenu();
            } else {
                closeMenu();
            }
        }

        if (menuButton && mobileMenu && menuIcon) {
            menuButton.addEventListener('click', toggleMenu);
        }
    });
</script>

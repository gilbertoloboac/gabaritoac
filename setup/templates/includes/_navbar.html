                       bg-transparent border-2 border-amber-400 dark:border-indigo-400
                                 hover:scale-[1.03] active:scale-95 transition-all duration-300 flex-shrink-0 shadow-sm">
                        <i id="darkmode-icon-sun-mobile" class="fa-regular fa-sun text-[11px] absolute left-[8px] z-10 transition-all duration-300
                            text-amber-600 dark:text-slate-400"></i>
                        <i id="darkmode-icon-moon-mobile" class="fa-regular fa-moon text-[11px] absolute right-[8px] z-10 transition-all duration-300
                            text-slate-400 dark:text-indigo-600"></i>
                        <span id="darkmode-thumb-mobile"
                            class="absolute top-[3px] left-[3px] w-6 h-6 rounded-full

                                   toggle-thumb-transition z-20">
                        </span>
                    </span>
                </button>
            </nav>
        </div>
    </div>
</nav>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        if (document.documentElement.classList.contains('dark')) {
            var thumb = document.getElementById('darkmode-thumb');
            var thumbMobile = document.getElementById('darkmode-thumb-mobile');
            var iconSun = document.getElementById('darkmode-icon-sun');
            var iconMoon = document.getElementById('darkmode-icon-moon');
            var iconSunMobile = document.getElementById('darkmode-icon-sun-mobile');
            var iconMoonMobile = document.getElementById('darkmode-icon-moon-mobile');
            if (thumb) thumb.style.transform = 'translateX(38px)';
            if (thumbMobile) thumbMobile.style.transform = 'translateX(38px)';
            if (iconSun) iconSun.className = 'fa-regular fa-sun text-[13px] absolute left-[10px] z-10 transition-all duration-300 text-slate-400';
            if (iconMoon) iconMoon.className = 'fa-regular fa-moon text-[13px] absolute right-[10px] z-10 transition-all duration-300 text-indigo-600';
            if (iconSunMobile) iconSunMobile.className = 'fa-regular fa-sun text-[11px] absolute left-[8px] z-10 transition-all duration-300 text-slate-400';
            if (iconMoonMobile) iconMoonMobile.className = 'fa-regular fa-moon text-[11px] absolute right-[8px] z-10 transition-all duration-300 text-indigo-600';
        }
        const menuButton = document.getElementById('mobile-menu-button');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuIcon = document.getElementById('menu-icon');

        function openMenu() {
            mobileMenu.classList.remove('max-h-0', 'opacity-0');
            mobileMenu.classList.add('max-h-96', 'opacity-100');
            menuIcon.classList.remove('fa-bars');
            menuIcon.classList.add('fa-times');
        }

        function closeMenu() {
            mobileMenu.classList.remove('max-h-96', 'opacity-100');
            mobileMenu.classList.add('max-h-0', 'opacity-0');
            menuIcon.classList.remove('fa-times');
            menuIcon.classList.add('fa-bars');
        }

        function toggleMenu() {
            if (mobileMenu.classList.contains('max-h-0')) {
                openMenu();
            } else {
                closeMenu();
            }
        }

        if (menuButton && mobileMenu && menuIcon) {
            menuButton.addEventListener('click', toggleMenu);
        }
    });
</script>

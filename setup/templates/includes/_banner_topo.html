{% load wagtailimages_tags %}
{% if banner %}
<div class="border-b border-gray-100">
    <p class="max-w-7xl mx-auto px-4 pt-2 pb-0 text-[9px] font-medium text-gray-300 uppercase tracking-[0.15em]">
        Publicidade
    </p>
    <a href="{{ banner.link }}" target="_blank" rel="noopener noreferrer"
       class="block w-full bg-gray-50 hover:bg-gray-50 transition">
        <div class="max-w-7xl mx-auto px-4 pb-3 flex items-center justify-center gap-2 text-sm text-gray-400">
            {% if banner.imagem %}
                {% image banner.imagem fill-900x100 class="w-full h-auto max-h-[100px] object-contain" alt=banner.cliente %}
            {% else %}
                <span class="font-semibold text-gray-700">{{ banner.cliente }}</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
            {% endif %}
        </div>
    </a>
</div>
{% endif %}
